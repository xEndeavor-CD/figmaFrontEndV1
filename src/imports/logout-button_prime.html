<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Animated Logout Button — Standalone Demo</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f1f5f9;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  }
  .demo-card {
    background: #ffffff;
    border-radius: 16px;
    padding: 32px 28px;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    width: 260px;
  }
  .demo-card h1 {
    font-size: 1rem;
    margin: 0 0 16px;
    color: #1e293b;
  }

/* =============================================================
   logout-button.css
   Animated logout button for ExpenseTracker dashboard.
   ============================================================= */

button.logoutButton {
  /* reset browser button defaults */
  border: 0;
  background: none;
  text-align: left;
  font-family: inherit;
  font-size: 0.92rem;
  font-weight: 500;

  /* CSS custom properties for animation states */
  --figure-duration: 100;
  --transform-figure: none;
  --walking-duration: 100;
  --transform-arm1: none;
  --transform-wrist1: none;
  --transform-arm2: none;
  --transform-wrist2: none;
  --transform-leg1: none;
  --transform-calf1: none;
  --transform-leg2: none;
  --transform-calf2: none;

  /* sizing & layout */
  display: flex;
  align-items: center;
  width: 100%;
  padding: 11px 14px;
  padding-left: 14px;
  border-radius: 10px;
  cursor: pointer;
  outline: none;
  position: relative;
  perspective: 100px;
  overflow: visible;
  -webkit-tap-highlight-color: transparent;

  /* colors */
  color: #475569;
  transition:
    background 0.15s,
    color 0.15s;
  background: #f8fafc;
}

button.logoutButton:hover {
  background: #fef2f2;
  color: #ef4444;
}

button.logoutButton:hover .button-text {
  color: #ef4444;
}

button.logoutButton:hover .door {
  transform: rotateY(20deg);
}

button.logoutButton:active .door {
  transform: rotateY(28deg);
}

/* Press ripple pseudo-element */
button.logoutButton::before {
  content: "";
  display: block;
  position: absolute;
  inset: 0;
  border-radius: 10px;
  background: rgba(239, 68, 68, 0.06);
  transform: scale(0.96);
  opacity: 0;
  transition:
    opacity 50ms ease,
    transform 50ms ease;
  z-index: 2;
  pointer-events: none;
}
button.logoutButton:active::before {
  opacity: 1;
  transform: scale(1);
}

/* Animation state classes */
button.logoutButton.clicked .door {
  transform: rotateY(35deg);
}

button.logoutButton.door-slammed .door {
  transform: none;
  transition: transform 100ms ease-in 250ms;
}

button.logoutButton.falling {
  animation: lb-shake 200ms linear;
}
button.logoutButton.falling .bang {
  animation: lb-flash 300ms linear;
}
button.logoutButton.falling .figure {
  animation: lb-spin 1000ms infinite linear;
  bottom: -1080px;
  opacity: 0;
  right: 1px;
  transition:
    transform calc(var(--figure-duration) * 1ms) linear,
    bottom calc(var(--figure-duration) * 1ms) cubic-bezier(0.7, 0.1, 1, 1) 100ms,
    opacity calc(var(--figure-duration) * 0.25ms) linear
      calc(var(--figure-duration) * 0.75ms);
  z-index: 1;
}

/* Button text */
button.logoutButton .button-text {
  color: inherit;
  font-weight: 500;
  position: relative;
  z-index: 10;
  transition: color 0.15s;
  pointer-events: none;
  margin-left: auto;
  margin-right: 75px;
}

/* SVG icons — positioned on the RIGHT side like the original door */
button.logoutButton svg {
  display: block;
  position: absolute;
  pointer-events: none;
}

button.logoutButton .figure {
  bottom: 5px;
  right: 18px;
  width: 28px;
  fill: #1e293b;
  transform: var(--transform-figure);
  transition: transform calc(var(--figure-duration) * 1ms)
    cubic-bezier(0.2, 0.1, 0.8, 0.9);
  z-index: 4;
}

button.logoutButton .doorway {
  bottom: 4px;
  right: 12px;
  width: 30px;
  fill: #94a3b8;
  z-index: 3;
}

button.logoutButton .door {
  bottom: 4px;
  right: 12px;
  width: 30px;
  fill: #94a3b8;
  transform: rotateY(20deg);
  transform-origin: 100% 50%;
  transform-style: preserve-3d;
  transition: transform 200ms ease;
  z-index: 5;
}

button.logoutButton .door path {
  fill: #ffffff;
  stroke: #94a3b8;
  stroke-width: 4;
}

button.logoutButton .door circle {
  fill: #94a3b8;
}

button.logoutButton .bang {
  opacity: 0;
}

/* Walking limb transitions */
button.logoutButton .arm1,
button.logoutButton .wrist1,
button.logoutButton .arm2,
button.logoutButton .wrist2,
button.logoutButton .leg1,
button.logoutButton .calf1,
button.logoutButton .leg2,
button.logoutButton .calf2 {
  transition: transform calc(var(--walking-duration) * 1ms) ease-in-out;
}

button.logoutButton .arm1 {
  transform: var(--transform-arm1);
  transform-origin: 52% 45%;
}
button.logoutButton .wrist1 {
  transform: var(--transform-wrist1);
  transform-origin: 59% 55%;
}
button.logoutButton .arm2 {
  transform: var(--transform-arm2);
  transform-origin: 47% 43%;
}
button.logoutButton .wrist2 {
  transform: var(--transform-wrist2);
  transform-origin: 35% 47%;
}
button.logoutButton .leg1 {
  transform: var(--transform-leg1);
  transform-origin: 47% 64.5%;
}
button.logoutButton .calf1 {
  transform: var(--transform-calf1);
  transform-origin: 55.5% 71.5%;
}
button.logoutButton .leg2 {
  transform: var(--transform-leg2);
  transform-origin: 43% 63%;
}
button.logoutButton .calf2 {
  transform: var(--transform-calf2);
  transform-origin: 41.5% 73%;
}

/* Keyframes */
@keyframes lb-spin {
  from { transform: rotate(0deg) scale(0.94); }
  to   { transform: rotate(359deg) scale(0.94); }
}
@keyframes lb-shake {
  0%   { transform: rotate(-1deg); }
  50%  { transform: rotate(2deg); }
  100% { transform: rotate(-1deg); }
}
@keyframes lb-flash {
  0%   { opacity: 0.4; }
  100% { opacity: 0; }
}
</style>
</head>
<body>

<div class="demo-card">
  <h1>Logout button demo</h1>

  <button id="logoutBtn" class="logoutButton" title="Log Out">
    <svg class="doorway" viewBox="0 0 100 100">
      <path d="M93.4 86.3H58.6c-1.9 0-3.4-1.5-3.4-3.4V17.1c0-1.9 1.5-3.4 3.4-3.4h34.8c1.9 0 3.4 1.5 3.4 3.4v65.8c0 1.9-1.5 3.4-3.4 3.4z"/>
      <path class="bang" d="M40.5 43.7L26.6 31.4l-2.5 6.7zM41.9 50.4l-19.5-4-1.4 6.3zM40 57.4l-17.7 3.9 3.9 5.7z"/>
    </svg>
    <svg class="figure" viewBox="0 0 100 100">
      <circle cx="52.1" cy="32.4" r="6.4"/>
      <path d="M50.7 62.8c-1.2 2.5-3.6 5-7.2 4-3.2-.9-4.9-3.5-4-7.8.7-3.4 3.1-13.8 4.1-15.8 1.7-3.4 1.6-4.6 7-3.7 4.3.7 4.6 2.5 4.3 5.4-.4 3.7-2.8 15.1-4.2 17.9z"/>
      <g class="arm1">
        <path d="M55.5 56.5l-6-9.5c-1-1.5-.6-3.5.9-4.4 1.5-1 3.7-1.1 4.6.4l6.1 10c1 1.5.3 3.5-1.1 4.4-1.5.9-3.5.5-4.5-.9z"/>
        <path class="wrist1" d="M69.4 59.9L58.1 58c-1.7-.3-2.9-1.9-2.6-3.7.3-1.7 1.9-2.9 3.7-2.6l11.4 1.9c1.7.3 2.9 1.9 2.6 3.7-.4 1.7-2 2.9-3.8 2.6z"/>
      </g>
      <g class="arm2">
        <path d="M34.2 43.6L45 40.3c1.7-.6 3.5.3 4 2 .6 1.7-.3 4-2 4.5l-10.8 2.8c-1.7.6-3.5-.3-4-2-.6-1.6.3-3.4 2-4z"/>
        <path class="wrist2" d="M27.1 56.2L32 45.7c.7-1.6 2.6-2.3 4.2-1.6 1.6.7 2.3 2.6 1.6 4.2L33 58.8c-.7 1.6-2.6 2.3-4.2 1.6-1.7-.7-2.4-2.6-1.7-4.2z"/>
      </g>
      <g class="leg1">
        <path d="M52.1 73.2s-7-5.7-7.9-6.5c-.9-.9-1.2-3.5-.1-4.9 1.1-1.4 3.8-1.9 5.2-.9l7.9 7c1.4 1.1 1.7 3.5.7 4.9-1.1 1.4-4.4 1.5-5.8.4z"/>
        <path class="calf1" d="M52.6 84.4l-1-12.8c-.1-1.9 1.5-3.6 3.5-3.7 2-.1 3.7 1.4 3.8 3.4l1 12.8c.1 1.9-1.5 3.6-3.5 3.7-2 0-3.7-1.5-3.8-3.4z"/>
      </g>
      <g class="leg2">
        <path d="M37.8 72.7s1.3-10.2 1.6-11.4 2.4-2.8 4.1-2.6c1.7.2 3.6 2.3 3.4 4l-1.8 11.1c-.2 1.7-1.7 3.3-3.4 3.1-1.8-.2-4.1-2.4-3.9-4.2z"/>
        <path class="calf2" d="M29.5 82.3l9.6-10.9c1.3-1.4 3.6-1.5 5.1-.1 1.5 1.4.4 4.9-.9 6.3l-8.5 9.6c-1.3 1.4-3.6 1.5-5.1.1-1.4-1.3-1.5-3.5-.2-5z"/>
      </g>
    </svg>
    <svg class="door" viewBox="0 0 100 100">
      <path d="M93.4 86.3H58.6c-1.9 0-3.4-1.5-3.4-3.4V17.1c0-1.9 1.5-3.4 3.4-3.4h34.8c1.9 0 3.4 1.5 3.4 3.4v65.8c0 1.9-1.5 3.4-3.4 3.4z"/>
      <circle cx="66" cy="50" r="3.7"/>
    </svg>
    <span class="button-text">Log Out</span>
  </button>
</div>

<!-- ── LOGOUT BUTTON ANIMATION ── -->
<script>
(function () {
  var states = {
    'default': {
      '--figure-duration': '100', '--transform-figure': 'none',
      '--walking-duration': '100',
      '--transform-arm1': 'none', '--transform-wrist1': 'none',
      '--transform-arm2': 'none', '--transform-wrist2': 'none',
      '--transform-leg1': 'none', '--transform-calf1':  'none',
      '--transform-leg2': 'none', '--transform-calf2':  'none'
    },
    'hover': {
      '--figure-duration': '100', '--transform-figure': 'translateX(1.5px)',
      '--walking-duration': '100',
      '--transform-arm1': 'rotate(-5deg)',   '--transform-wrist1': 'rotate(-15deg)',
      '--transform-arm2': 'rotate(5deg)',    '--transform-wrist2': 'rotate(6deg)',
      '--transform-leg1': 'rotate(-10deg)',  '--transform-calf1':  'rotate(5deg)',
      '--transform-leg2': 'rotate(20deg)',   '--transform-calf2':  'rotate(-20deg)'
    },
    'walking1': {
      '--figure-duration': '300', '--transform-figure': 'translateX(11px)',
      '--walking-duration': '300',
      '--transform-arm1': 'translateX(-4px) translateY(-2px) rotate(120deg)',
      '--transform-wrist1': 'rotate(-5deg)',
      '--transform-arm2': 'translateX(4px) rotate(-110deg)',
      '--transform-wrist2': 'rotate(-5deg)',
      '--transform-leg1': 'translateX(-3px) rotate(80deg)',
      '--transform-calf1': 'rotate(-30deg)',
      '--transform-leg2': 'translateX(4px) rotate(-60deg)',
      '--transform-calf2': 'rotate(20deg)'
    },
    'walking2': {
      '--figure-duration': '400', '--transform-figure': 'translateX(17px)',
      '--walking-duration': '300',
      '--transform-arm1': 'rotate(60deg)',  '--transform-wrist1': 'rotate(-15deg)',
      '--transform-arm2': 'rotate(-45deg)', '--transform-wrist2': 'rotate(6deg)',
      '--transform-leg1': 'rotate(-5deg)',  '--transform-calf1':  'rotate(10deg)',
      '--transform-leg2': 'rotate(10deg)',  '--transform-calf2':  'rotate(-20deg)'
    },
    'falling1': {
      '--figure-duration': '1600', '--walking-duration': '400',
      '--transform-arm1': 'rotate(-60deg)',  '--transform-wrist1': 'none',
      '--transform-arm2': 'rotate(30deg)',   '--transform-wrist2': 'rotate(120deg)',
      '--transform-leg1': 'rotate(-30deg)',  '--transform-calf1':  'rotate(-20deg)',
      '--transform-leg2': 'rotate(20deg)'
    },
    'falling2': {
      '--walking-duration': '300',
      '--transform-arm1': 'rotate(-100deg)', '--transform-arm2': 'rotate(-60deg)',
      '--transform-wrist2': 'rotate(60deg)',
      '--transform-leg1': 'rotate(80deg)',   '--transform-calf1': 'rotate(20deg)',
      '--transform-leg2': 'rotate(-60deg)'
    },
    'falling3': {
      '--walking-duration': '500',
      '--transform-arm1': 'rotate(-30deg)',  '--transform-wrist1': 'rotate(40deg)',
      '--transform-arm2': 'rotate(50deg)',   '--transform-wrist2': 'none',
      '--transform-leg1': 'rotate(-30deg)',  '--transform-leg2':   'rotate(20deg)',
      '--transform-calf2': 'none'
    }
  };

  function setState(btn, key) {
    if (!states[key]) return;
    btn.state = key;
    for (var prop in states[key]) btn.style.setProperty(prop, states[key][prop]);
  }

  function runLogoutAnimation(btn, onComplete) {
    btn.classList.add('clicked');
    setState(btn, 'walking1');
    setTimeout(function () {
      btn.classList.add('door-slammed');
      setState(btn, 'walking2');
      setTimeout(function () {
        btn.classList.add('falling');
        setState(btn, 'falling1');
        setTimeout(function () {
          setState(btn, 'falling2');
          setTimeout(function () {
            setState(btn, 'falling3');
            setTimeout(onComplete, 1000);
          }, states['falling2']['--walking-duration']);
        }, states['falling1']['--walking-duration']);
      }, states['walking2']['--figure-duration']);
    }, states['walking1']['--figure-duration']);
  }

  function initLogoutBtn(id) {
    var btn = document.getElementById(id);
    if (!btn) return;
    btn.state = 'default';

    btn.addEventListener('mouseenter', function () {
      if (btn.state === 'default') setState(btn, 'hover');
    });
    btn.addEventListener('mouseleave', function () {
      if (btn.state === 'hover') setState(btn, 'default');
    });
    btn.addEventListener('click', function () {
      if (btn.state !== 'default' && btn.state !== 'hover') return;
      runLogoutAnimation(btn, function () {
        // Reset so the demo can be replayed.
        btn.classList.remove('clicked', 'door-slammed', 'falling');
        setState(btn, 'default');
      });
    });
  }

  initLogoutBtn('logoutBtn');
})();
</script>

</body>
</html>
